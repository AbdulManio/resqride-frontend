name: rescue_ride
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.0.1
  provider: ^6.1.5+1
  intl: ^0.20.2
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  permission_handler: ^11.0.1
  geocoding: ^3.0.0
  image_picker: ^1.0.4
  http: ^1.6.0
  socket_io_client: ^3.1.4
  shared_preferences: ^2.5.5
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

# ---------------- FLUTTER SECTION ----------------
flutter:
  uses-material-design: true

  assets:
    - assets/logo.png

# ---------------- ICON CONFIG (ROOT LEVEL) ----------------
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
  
  # Adaptive icons for Android (better scaling)
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/logo.png"
  
  # iOS settings
  remove_alpha_ios: true
  
  web:
    generate: true
    image_path: "assets/logo.png"
    background_color: "#ffffff"
    theme_color: "#4285f4"

  windows:
    generate: true
    image_path: "assets/logo.png"
    icon_size: 256

  macos:
    generate: true
    image_path: "assets/logo.png"
